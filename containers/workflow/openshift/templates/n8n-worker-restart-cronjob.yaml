---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: n8n-worker-restart-cronjob
objects:
  - kind: ServiceAccount
    apiVersion: v1
    metadata:
      name: "${NAME}-worker-restarter"
      namespace: "${NAMESPACE}"
      labels:
        app.kubernetes.io/part-of: "${NAME}-app"
  - kind: Role
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: "${NAME}-worker-restarter"
      namespace: "${NAMESPACE}"
      labels:
        app.kubernetes.io/part-of: "${NAME}-app"
    rules:
      - apiGroups:
          - apps
        resources:
          - deployments
        resourceNames:
          - "${NAME}-worker"
        verbs:
          - get
          - patch
  - kind: RoleBinding
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: "${NAME}-worker-restarter"
      namespace: "${NAMESPACE}"
      labels:
        app.kubernetes.io/part-of: "${NAME}-app"
    subjects:
      - kind: ServiceAccount
        name: "${NAME}-worker-restarter"
        namespace: "${NAMESPACE}"
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: "${NAME}-worker-restarter"
  - kind: CronJob
    apiVersion: batch/v1
    metadata:
      name: "${NAME}-worker-weekly-restart"
      namespace: "${NAMESPACE}"
      labels:
        app.kubernetes.io/part-of: "${NAME}-app"
        app.kubernetes.io/component: "${NAME}-worker"
    spec:
      schedule: "${WORKER_RESTART_SCHEDULE}"
      timeZone: "${WORKER_RESTART_TIMEZONE}"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          backoffLimit: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/part-of: "${NAME}-app"
                app.kubernetes.io/component: "${NAME}-worker"
            spec:
              serviceAccountName: "${NAME}-worker-restarter"
              restartPolicy: OnFailure
              containers:
                - name: worker-restart
                  image: "image-registry.openshift-image-registry.svc:5000/${N8N_IMAGE_NAMESPACE}/${NAME}:latest"
                  imagePullPolicy: Always
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail
                      oc -n "${NAMESPACE}" rollout restart deployment/"${NAME}-worker"
                  resources:
                    requests:
                      cpu: 10m
                      memory: 64Mi
                    limits:
                      cpu: 100m
                      memory: 128Mi
parameters:
  - name: NAME
    value: n8n
  - name: NAMESPACE
    required: true
    value: bf5ef6-prod
  - name: N8N_IMAGE_NAMESPACE
    required: true
  - name: WORKER_RESTART_SCHEDULE
    value: "0 12 * * 0"
  - name: WORKER_RESTART_TIMEZONE
    value: America/Vancouver
