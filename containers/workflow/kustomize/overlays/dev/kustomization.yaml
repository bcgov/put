apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bf5ef6-dev
resources:
  - ../../base
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n
    path: deployment-n8n-live-selector.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n
    path: deployment-n8n-spread.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n-worker
    path: deployment-worker-live-selector.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n-worker
    path: deployment-worker-spread.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n-webhook
    path: deployment-webhook-live-selector.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: n8n-webhook
    path: deployment-webhook-spread.yaml
  - target:
      version: v1
      kind: Service
      name: n8n
    path: service-main-live-selector.yaml
  - target:
      version: v1
      kind: Service
      name: n8n-worker
    path: service-worker-live-selector.yaml
  - target:
      version: v1
      kind: Service
      name: n8n-webhook
    path: service-webhook-live-selector.yaml
  - target:
      group: policy
      version: v1
      kind: PodDisruptionBudget
      name: n8n
    path: pdb-main-live-selector.yaml
  - target:
      group: policy
      version: v1
      kind: PodDisruptionBudget
      name: n8n-worker
    path: pdb-worker-live-selector.yaml
  - target:
      group: policy
      version: v1
      kind: PodDisruptionBudget
      name: n8n-webhook
    path: pdb-webhook-live-selector.yaml
  - path: route-main-host.yaml
  - path: route-webhook-host.yaml
  - path: n8n-webhook-url.yaml
  - path: worker-resources.yaml
